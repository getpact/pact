name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
          POSTGRES_DB: pact
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://pact:pact@localhost:5432/pact
      RLS_TEST_DB: postgres://pact_app:pact_app@localhost:5432/pact
      PG_POOL_MAX: "2"
      PG_IDLE_TIMEOUT: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:db
      - run: pnpm build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks
        run: |
          version=8.30.1
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${version}_linux_x64.tar.gz" gitleaks
          sudo mv gitleaks /usr/local/bin/
      - run: gitleaks detect --source . --no-banner --redact
