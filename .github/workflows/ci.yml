name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://pact:pact@localhost:5432/pact
      RLS_TEST_DB: postgres://pact_app:pact_app@localhost:5432/pact
      PG_POOL_MAX: "2"
      PG_IDLE_TIMEOUT: "1"
      LOG_LEVEL: "warn"
      PACT_QUIET_PG_NOTICES: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: start postgres with raised max_connections
        run: |
          docker compose -f infra/compose/docker-compose.yml up -d --wait
          for _ in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U pact >/dev/null 2>&1; then exit 0; fi
            sleep 1
          done
          echo "postgres did not become ready" >&2
          exit 1
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:db
      - run: pnpm build

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install gitleaks
        run: |
          version=8.30.1
          wget -q "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz"
          tar -xzf "gitleaks_${version}_linux_x64.tar.gz" gitleaks
          sudo mv gitleaks /usr/local/bin/
      - run: gitleaks detect --source . --no-banner --redact
