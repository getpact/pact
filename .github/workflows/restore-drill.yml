name: restore-drill

on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drill:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_R2_READ_TOKEN }}
      R2_BUCKET: pact-backups
      R2_DUMP_PREFIX: postgres/
      PACT_DRILL_WORKSPACE_ID: ${{ secrets.PACT_DRILL_WORKSPACE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: install postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
      - name: install wrangler
        run: npm install -g wrangler@3
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @getpact/db build
      - run: pnpm --filter @getpact/cli build
      - name: run drill
        id: drill
        continue-on-error: true
        run: bash scripts/restore-drill.sh
      - name: open issue on failure
        if: steps.drill.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `restore drill failed on ${new Date().toISOString().slice(0, 10)}`;
            const body = [
              "Weekly restore drill failed.",
              "",
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              "",
              "First two scheduled runs are notify only. Investigate the linked logs and update",
              "docs/runbook/backup-restore.md if any assumption changed.",
            ].join("\n");
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["ops", "restore-drill"],
            });
      - name: fail job after grace period
        if: steps.drill.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          runs=$(gh run list --workflow restore-drill.yml --json databaseId --limit 10 -q 'length')
          if [ "${runs:-0}" -gt 2 ]; then
            echo "drill has run more than twice; failing the job"
            exit 1
          fi
          echo "early run; notify only"
