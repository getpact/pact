[project]
name = "getpact-verifier"
version = "0.0.0"
description = "Verify Pact JWTs and audit chains in Python"
license = "MIT"
requires-python = ">=3.11"
readme = "README.md"
dependencies = [
    "cryptography>=42",
    "pyjwt>=2.8",
    "httpx>=0.27"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/getpact_verifier"]
