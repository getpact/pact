name = "pact-issuer"
main = "src/worker.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
routes = [{ pattern = "issuer.getpact.dev", custom_domain = true }]

[vars]
ENVIRONMENT = "production"
ISSUER_BASE_URL = "https://issuer.getpact.dev"
WEB_OAUTH_REDIRECT_URI = "https://app.getpact.dev/v1/auth/google/callback"

[triggers]
crons = ["0 4 * * 0"]

[observability]
enabled = true
