name = "pact-web"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
routes = [{ pattern = "app.getpact.dev", custom_domain = true }]

[vars]
ENVIRONMENT = "production"
WEB_BASE_URL = "https://app.getpact.dev"
ISSUER_BASE_URL = "https://issuer.getpact.dev"
ADMIN_API_BASE_URL = "https://admin.getpact.dev"
AUDIT_API_BASE_URL = "https://audit.getpact.dev"
ADMIN_AUDIENCE = "pact-admin"
GOOGLE_OAUTH_AUTHORIZATION_ENDPOINT = "https://accounts.google.com/o/oauth2/v2/auth"

[observability]
enabled = true
