name = "pact-mcp-server"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
routes = [{ pattern = "mcp.getpact.dev", custom_domain = true }]

[vars]
ENVIRONMENT = "production"
ISSUER_BASE_URL = "https://issuer.getpact.dev"
MCP_AUDIENCE = "pact-mcp"

[[services]]
binding = "VERIFIER_SERVICE"
service = "pact-verifier"

[observability]
enabled = true
