name = "pact-mcp-server"
main = "src/index.ts"
compatibility_date = "2026-04-01"
compatibility_flags = ["nodejs_compat"]
workers_dev = false
routes = [{ pattern = "mcp.getpact.dev", custom_domain = true }]

[vars]
ENVIRONMENT = "production"
ISSUER_BASE_URL = "https://issuer.getpact.dev"
MCP_AUDIENCE = "pact-mcp"

[env.local.vars]
ENVIRONMENT = "development"
ISSUER_BASE_URL = "http://127.0.0.1:8787"
MCP_AUDIENCE = "pact-mcp"
VERIFIER_URL = "http://127.0.0.1:8789"

[[services]]
binding = "VERIFIER_SERVICE"
service = "pact-verifier"

[observability]
enabled = true
