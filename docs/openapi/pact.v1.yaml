openapi: 3.1.0
info:
  title: Pact API
  version: 0.1.0
  description: Pre-v1 HTTP contract for Pact Workers. This file is the source of truth until route-level runtime schemas are introduced.
servers:
  - url: https://api.getpact.dev
tags:
  - name: issuer
  - name: verifier
  - name: admin
  - name: audit
  - name: gateway
  - name: mcp
  - name: dashboard
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [issuer]
      summary: Health check
      security: []
      responses:
        "200":
          description: Worker is healthy.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
  /v1/dev/issue:
    post:
      tags: [issuer]
      summary: Issue a development token
      description: Available only when ENABLE_DEV_ISSUE=true and ENVIRONMENT is not production. Non-test environments require x-pact-dev-issue-secret.
      security:
        - devIssueSecretAuth: []
      parameters:
        - in: header
          name: x-pact-dev-issue-secret
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, email, audience]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                email:
                  type: string
                  format: email
                audience:
                  $ref: "#/components/schemas/Audience"
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedToken"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Development issue endpoint is disabled or not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces:
    post:
      tags: [issuer]
      summary: Create a workspace
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [slug, name, adminEmail]
              properties:
                slug:
                  type: string
                name:
                  type: string
                region:
                  type: string
                adminEmail:
                  type: string
                  format: email
                adminName:
                  type: string
      responses:
        "201":
          description: Workspace created.
          content:
            application/json:
              schema:
                type: object
                required: [workspaceId, adminUserId, jwtKeyId, auditKeyId]
                properties:
                  workspaceId:
                    type: string
                    format: uuid
                  adminUserId:
                    type: string
                    format: uuid
                  jwtKeyId:
                    type: string
                  auditKeyId:
                    type: string
        default:
          $ref: "#/components/responses/Error"
  /v1/oauth/google/exchange:
    post:
      tags: [issuer]
      summary: Exchange a Google OAuth code for Pact tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, code, codeVerifier, redirectUri, audience]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                code:
                  type: string
                codeVerifier:
                  type: string
                redirectUri:
                  type: string
                  format: uri
                audience:
                  $ref: "#/components/schemas/Audience"
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedToken"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/oauth/google/session:
    post:
      tags: [issuer]
      summary: Exchange a Google OAuth code for a dashboard token bundle
      security:
        - webIssuerServiceAuth: []
      parameters:
        - in: header
          name: x-pact-web-service-token
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, code, codeVerifier, redirectUri, audiences]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                code:
                  type: string
                codeVerifier:
                  type: string
                redirectUri:
                  type: string
                  format: uri
                audiences:
                  type: array
                  minItems: 1
                  maxItems: 2
                  uniqueItems: true
                  items:
                    $ref: "#/components/schemas/DashboardAudience"
      responses:
        "200":
          description: Token bundle issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenBundle"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/Error"
  /v1/config:
    get:
      tags: [dashboard]
      summary: Read dashboard runtime configuration
      description: Public BFF config used by the dashboard to display local OAuth setup status. Does not expose secrets.
      security: []
      responses:
        "200":
          description: Dashboard runtime config returned.
          content:
            application/json:
              schema:
                type: object
                required: [mode, oauthConfigured]
                properties:
                  mode:
                    type: string
                    enum: [production, nonproduction]
                  oauthConfigured:
                    type: boolean
                  defaultWorkspaceId:
                    type: string
                    format: uuid
                    nullable: true
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/google/start:
    post:
      tags: [dashboard]
      summary: Start dashboard Google OAuth
      description: Same-origin BFF endpoint. Requires an exact Origin or Referer matching WEB_BASE_URL and returns a Google authorization URL plus HttpOnly OAuth cookies.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId]
              properties:
                workspaceId:
                  type: string
                  format: uuid
      responses:
        "200":
          description: OAuth authorization URL returned.
          content:
            application/json:
              schema:
                type: object
                required: [location]
                properties:
                  location:
                    type: string
                    format: uri
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        default:
          $ref: "#/components/responses/Error"
  /v1/auth/google/callback:
    get:
      tags: [dashboard]
      summary: Complete dashboard Google OAuth
      description: Browser callback that validates HttpOnly state and exchanges the code through the issuer session endpoint.
      security: []
      responses:
        "302":
          description: Session cookies stored and browser redirected to the dashboard.
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"
  /v1/connections/google-drive/start:
    post:
      tags: [dashboard]
      summary: Start Google Drive OAuth
      description: Same-origin BFF endpoint that requires a dashboard session and CSRF token. Returns a Google authorization URL plus HttpOnly Drive OAuth cookies.
      security:
        - csrfHeader: []
      parameters:
        - in: header
          name: x-pact-csrf
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drive OAuth authorization URL returned.
          content:
            application/json:
              schema:
                type: object
                required: [location]
                properties:
                  location:
                    type: string
                    format: uri
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        default:
          $ref: "#/components/responses/Error"
  /v1/connections/google-drive:
    delete:
      tags: [dashboard]
      summary: Disconnect Google Drive through the dashboard BFF
      security:
        - csrfHeader: []
      parameters:
        - in: header
          name: x-pact-csrf
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Drive connection disconnected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/connections/google-drive/callback:
    get:
      tags: [dashboard]
      summary: Complete Google Drive OAuth
      description: Browser callback that validates HttpOnly Drive state and forwards the code to the admin API. Google tokens are never exposed to browser JavaScript.
      security: []
      responses:
        "302":
          description: Drive connection stored and browser redirected to the dashboard.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "502":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /oauth/oidc/callback:
    get:
      tags: [dashboard]
      summary: Complete local dashboard Google OAuth
      description: Browser callback alias used by the local Google OAuth client. Validates HttpOnly state and exchanges the code through the issuer session endpoint.
      security: []
      responses:
        "302":
          description: Session cookies stored and browser redirected to the dashboard.
        "401":
          $ref: "#/components/responses/Unauthorized"
        default:
          $ref: "#/components/responses/Error"
  /v1/session:
    get:
      tags: [dashboard]
      summary: Read dashboard session state
      description: Same-origin BFF endpoint backed by HttpOnly Pact cookies. Access tokens are never returned.
      security: []
      responses:
        "200":
          description: Session state returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSession"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [dashboard]
      summary: Clear dashboard session cookies
      security:
        - csrfHeader: []
      parameters:
        - in: header
          name: x-pact-csrf
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session cleared.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/Error"
  /v1/session/refresh:
    post:
      tags: [dashboard]
      summary: Refresh dashboard Pact tokens
      security:
        - csrfHeader: []
      parameters:
        - in: header
          name: x-pact-csrf
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session refreshed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspace/status:
    get:
      tags: [dashboard]
      summary: Read dashboard workspace status
      description: BFF-owned status DTO; upstream admin/audit tokens remain in HttpOnly cookies.
      security: []
      responses:
        "200":
          description: Workspace status returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardWorkspaceStatus"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "502":
          $ref: "#/components/responses/Error"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/connections/google-drive:
    get:
      tags: [admin]
      summary: Read Google Drive connection status
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Drive connection status for the authenticated workspace user.
          content:
            application/json:
              schema:
                type: object
                required: [connection]
                properties:
                  connection:
                    $ref: "#/components/schemas/DriveConnection"
        default:
          $ref: "#/components/responses/Error"
    delete:
      tags: [admin]
      summary: Disconnect Google Drive
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Drive connection removed or already absent.
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/Ok"
                  - type: object
                    required: [connection]
                    properties:
                      connection:
                        $ref: "#/components/schemas/DriveConnection"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/connections/google-drive/oauth:
    post:
      tags: [admin]
      summary: Store Google Drive OAuth tokens
      description: Exchanges a Google OAuth code server-side, verifies the Google subject matches the signed-in Pact user, stores encrypted token material, and writes connection metadata.
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, codeVerifier, nonce, redirectUri]
              properties:
                code:
                  type: string
                codeVerifier:
                  type: string
                nonce:
                  type: string
                redirectUri:
                  type: string
                  format: uri
      responses:
        "200":
          description: Drive connection stored.
          content:
            application/json:
              schema:
                type: object
                required: [connection]
                properties:
                  connection:
                    $ref: "#/components/schemas/DriveConnection"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        default:
          $ref: "#/components/responses/Error"
  /v1/refresh:
    post:
      tags: [issuer]
      summary: Redeem a refresh token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId, refreshToken, audience]
              properties:
                workspaceId:
                  type: string
                  format: uuid
                refreshToken:
                  type: string
                audience:
                  $ref: "#/components/schemas/Audience"
      responses:
        "200":
          description: Token issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssuedToken"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          $ref: "#/components/responses/PayloadTooLarge"
        "429":
          $ref: "#/components/responses/RateLimited"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/.well-known/jwks.json:
    get:
      tags: [issuer]
      summary: Workspace JWT JWKS
      security: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: JWKS document.
          headers:
            cache-control:
              schema:
                type: string
              description: Public cache directive for workspace signing keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Jwks"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/.well-known/audit-jwks.json:
    get:
      tags: [issuer]
      summary: Workspace audit JWKS
      security: []
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: JWKS document.
          headers:
            cache-control:
              schema:
                type: string
              description: Public cache directive for workspace audit signing keys.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Jwks"
        default:
          $ref: "#/components/responses/Error"
  /v1/verify:
    post:
      tags: [verifier]
      summary: Verify a requested action against policy
      security:
        - verifierServiceAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyRequest"
      responses:
        "200":
          description: Allowed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "400":
          description: Invalid audience.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Missing or invalid verifier service token.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Denied by policy or token validation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResponse"
        "503":
          description: Verifier service token not configured in production.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /v1/workspaces/{workspaceId}/users:
    get:
      tags: [admin]
      summary: List users
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Users.
          content:
            application/json:
              schema:
                type: object
                required: [users]
                properties:
                  users:
                    type: array
                    items:
                      $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [admin]
      summary: Create a user
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                name:
                  type: string
      responses:
        "201":
          description: User created.
          content:
            application/json:
              schema:
                type: object
                required: [user]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/groups:
    post:
      tags: [admin]
      summary: Create a group
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupCreate"
      responses:
        "201":
          description: Group created.
          content:
            application/json:
              schema:
                type: object
                required: [group]
                properties:
                  group:
                    $ref: "#/components/schemas/Group"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/groups/{groupId}/members:
    post:
      tags: [admin]
      summary: Add a user to a group
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - in: path
          name: groupId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId]
              properties:
                userId:
                  type: string
                  format: uuid
      responses:
        "201":
          description: Member added.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/policies:
    get:
      tags: [admin]
      summary: List policies
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Policies.
          content:
            application/json:
              schema:
                type: object
                required: [policies]
                properties:
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/PolicySummary"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [admin]
      summary: Create a policy version
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: object
      responses:
        "201":
          description: Policy created.
          content:
            application/json:
              schema:
                type: object
                required: [policy]
                properties:
                  policy:
                    $ref: "#/components/schemas/PolicySummary"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/revocations:
    post:
      tags: [admin]
      summary: Revoke a token JTI
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevocationCreate"
      responses:
        "201":
          description: Token revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/invites:
    post:
      tags: [admin]
      summary: Create an invite
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteCreate"
      responses:
        "201":
          description: Invite created.
          content:
            application/json:
              schema:
                type: object
                required: [invite]
                properties:
                  invite:
                    $ref: "#/components/schemas/Invite"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/brains:
    get:
      tags: [admin]
      summary: List gateway brains
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Brains.
          content:
            application/json:
              schema:
                type: object
                required: [brains]
                properties:
                  brains:
                    type: array
                    items:
                      $ref: "#/components/schemas/Brain"
        default:
          $ref: "#/components/responses/Error"
    post:
      tags: [admin]
      summary: Create a gateway brain
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BrainCreate"
      responses:
        "201":
          description: Brain created.
          content:
            application/json:
              schema:
                type: object
                required: [brain]
                properties:
                  brain:
                    $ref: "#/components/schemas/Brain"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/brains/{brainId}:
    delete:
      tags: [admin]
      summary: Delete a gateway brain
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - in: path
          name: brainId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Brain deleted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/brains/{brainId}/credential:
    put:
      tags: [admin]
      summary: Store a gateway brain bearer credential
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - in: path
          name: brainId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
      responses:
        "200":
          description: Credential stored.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ok"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/audit/events:
    get:
      tags: [audit]
      summary: List audit events
      parameters:
        - $ref: "#/components/parameters/workspaceId"
        - in: query
          name: action
          schema:
            type: string
        - in: query
          name: since
          schema:
            type: string
            format: date-time
        - in: query
          name: until
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 200
        - in: query
          name: cursor
          schema:
            type: string
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
      responses:
        "200":
          description: Audit events.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEventsPage"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/audit/workspace:
    get:
      tags: [audit]
      summary: Workspace metadata for audit verification
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Workspace metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditWorkspace"
        default:
          $ref: "#/components/responses/Error"
  /v1/workspaces/{workspaceId}/audit/chain:
    get:
      tags: [audit]
      summary: Current audit chain head
      parameters:
        - $ref: "#/components/parameters/workspaceId"
      responses:
        "200":
          description: Chain head.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditChainHead"
        default:
          $ref: "#/components/responses/Error"
  /{workspace}/mcp:
    post:
      tags: [mcp]
      summary: JSON-RPC MCP endpoint for a workspace
      parameters:
        - in: path
          name: workspace
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: JSON-RPC response.
        default:
          $ref: "#/components/responses/Error"
  /{workspace}/gateway/{brain}/{path}:
    parameters:
      - in: path
        name: workspace
        required: true
        schema:
          type: string
      - in: path
        name: brain
        required: true
        schema:
          type: string
      - in: path
        name: path
        required: true
        schema:
          type: string
    x-pact-note: Gateway accepts all HTTP methods and forwards only configured request headers.
    x-pact-opaque-upstream: true
    get:
      tags: [gateway]
