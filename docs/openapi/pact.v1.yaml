components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    verifierServiceAuth:
      type: http
      scheme: bearer
      description: Shared service token used by internal callers.
    devIssueSecretAuth:
      type: apiKey
      in: header
      name: x-pact-dev-issue-secret
      description: Required outside ENVIRONMENT=test when the dev issue endpoint is enabled.
    webIssuerServiceAuth:
      type: apiKey
      in: header
      name: x-pact-web-service-token
      description: Shared service token used by the dashboard BFF for OAuth code exchange.
    csrfHeader:
      type: apiKey
      in: header
      name: x-pact-csrf
      description: Same-origin dashboard CSRF token.
  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid credentials.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Authenticated request is not allowed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource was not found or is not exposed in this environment.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    PayloadTooLarge:
      description: Request body is too large.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Too many requests.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Error:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
  parameters:
    workspaceId:
      in: path
      name: workspaceId
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    Ok:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string
        message:
          type: string
    Audience:
      type: string
      enum: [pact-admin, pact-audit, pact-mcp, pact-gateway]
    DashboardAudience:
      type: string
      enum: [pact-admin, pact-audit]
    DashboardSession:
      type: object
      required: [authenticated]
      properties:
        authenticated:
          type: boolean
        workspaceId:
          type: string
          format: uuid
        csrfToken:
          type: string
        claims:
          type: object
          properties:
            workspaceId:
              type: string
              format: uuid
            userId:
              type: string
            email:
              type: string
              format: email
            exp:
              type: integer
            roles:
              type: array
              items:
                type: string
            groups:
              type: array
              items:
                type: string
    DashboardWorkspaceStatus:
      type: object
      required: [workspaceId, users, brains, connections, audit]
      properties:
        workspaceId:
          type: string
          format: uuid
        users:
          type: object
          required: [count]
          properties:
            count:
              type: integer
        brains:
          type: array
          items:
            $ref: "#/components/schemas/DashboardBrain"
        connections:
          type: object
          required: [drive]
          properties:
            drive:
              $ref: "#/components/schemas/DriveConnection"
        audit:
          type: object
          properties:
            head:
              type: object
              nullable: true
    DriveConnection:
      type: object
      required: [status]
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: [not_configured, connected, expired, disconnected]
        email:
          type: string
          format: email
        scopes:
          type: array
          items:
            type: string
        expiresAt:
          type: string
          format: date-time
        connectedAt:
          type: string
          format: date-time
        lastRefreshAt:
          type: string
          format: date-time
        lastError:
          type: string
          nullable: true
    Jwks:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            type: object
            required: [kty, crv, x, kid, alg, use]
            properties:
              kty:
                type: string
                enum: [OKP]
              crv:
                type: string
                enum: [Ed25519]
              x:
                type: string
              kid:
                type: string
              alg:
                type: string
                enum: [EdDSA]
              use:
                type: string
                enum: [sig]
    IssuedToken:
      type: object
      required: [token, jti, exp, userId, refreshToken, refreshExpiresAt]
      properties:
        token:
          type: string
        jti:
          type: string
          format: uuid
        exp:
          type: integer
        userId:
          type: string
          format: uuid
        refreshToken:
          type: string
        refreshExpiresAt:
          type: string
          format: date-time
    TokenBundle:
      type: object
      required: [tokens]
      properties:
        tokens:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/IssuedToken"
    VerifyRequest:
      type: object
      required: [token, action, resource]
      properties:
        token:
          type: string
        action:
          type: string
        resource:
          type: string
        audience:
          type: string
    VerifyResponse:
      type: object
      required: [allow, reasons]
      properties:
        allow:
          type: boolean
        reasons:
          type: array
          items:
            type: string
        sub:
          type: string
    User:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    Group:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
    PolicySummary:
      type: object
      required: [id, version]
      properties:
        id:
          type: string
          format: uuid
        version:
          type: integer
        createdAt:
          type: string
          format: date-time
        replacedAt:
          type: string
          format: date-time
          nullable: true
    Invite:
      type: object
      required: [id, email, expiresAt]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        expiresAt:
          type: string
          format: date-time
    DashboardBrain:
      type: object
      required: [id, kind, status]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
        status:
          type: string
    Brain:
      type: object
      required: [id, kind, baseUrl]
      properties:
        id:
          type: string
          format: uuid
        kind:
          type: string
        baseUrl:
          type: string
          format: uri
        authScheme:
          type: string
          enum: [none, bearer]
        status:
          type: string
        createdAt:
          type: string
          format: date-time
    AuditEvent:
      type: object
      required: [id, workspaceId, auditSeq, ts, actorKind, action, target, decision, signingKeyId, prevHash, thisHash, signature]
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        auditSeq:
          type: integer
        ts:
          type: string
          format: date-time
        actorKind:
          type: string
        actorId:
          type: string
          nullable: true
        action:
          type: string
        target:
          type: object
        decision:
          type: string
        supporting:
          type: object
        signingKeyId:
          type: string
        prevHash:
          type: string
        thisHash:
          type: string
        signature:
          type: string
    AuditEventsPage:
      type: object
      required: [events, nextCursor]
      properties:
        events:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        nextCursor:
          type: string
          nullable: true
    AuditWorkspace:
      type: object
      required: [id, slug, createdAt]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        createdAt:
          type: string
          format: date-time
    AuditChainHead:
      type: object
      required: [head]
      properties:
        head:
          oneOf:
            - type: "null"
            - type: object
              required: [lastHash, lastEventId, updatedAt]
              properties:
                lastHash:
                  type: string
                lastEventId:
                  type: string
                  format: uuid
                updatedAt:
                  type: string
                  format: date-time
    GroupCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
    RevocationCreate:
      type: object
      required: [jti]
      properties:
        jti:
          type: string
        reason:
          type: string
    InviteCreate:
      type: object
      required: [email, scope, ttl]
      properties:
        email:
          type: string
          format: email
        scope:
          type: object
        ttl:
          type: string
          enum: [1d, 1w, 1m]
    BrainCreate:
      type: object
      required: [kind, baseUrl]
      properties:
        kind:
          type: string
          pattern: "^[a-z][a-z0-9-]{0,32}$"
        baseUrl:
          type: string
          format: uri
        authScheme:
          type: string
          enum: [none, bearer]
