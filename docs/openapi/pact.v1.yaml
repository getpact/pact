        "502":
          $ref: "#/components/responses/Error"
        "503":
          $ref: "#/components/responses/Error"
        "504":
          $ref: "#/components/responses/Error"
    post:
      tags: [gateway]
      summary: Gateway POST to a brain upstream
      requestBody:
