pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm biome check --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      # Turbo caches per-package; only changed packages recompile.
      # Skip with PACT_SKIP_PRECOMMIT_TYPECHECK=1 for staged-only quick commits.
      run: |
        if [ "${PACT_SKIP_PRECOMMIT_TYPECHECK:-0}" = "1" ]; then
          echo "[pre-commit] PACT_SKIP_PRECOMMIT_TYPECHECK=1 set; skipping typecheck."
          exit 0
        fi
        pnpm typecheck
    ascii-tells:
      run: |
        files=$(git diff --cached --name-only --diff-filter=ACM)
        if [ -z "$files" ]; then exit 0; fi
        python3 - <<'PY' $files
        import sys
        bads = [chr(c) for c in (0x2013, 0x2014, 0x2018, 0x2019, 0x201C, 0x201D, 0x2022, 0x2026)]
        found = False
        for f in sys.argv[1:]:
            try:
                with open(f, "r", encoding="utf-8") as fh:
                    content = fh.read()
            except Exception:
                continue
            for b in bads:
                if b in content:
                    print(f"{f}: contains U+{ord(b):04X}")
                    found = True
                    break
        if found:
            print()
            print("ASCII tell detected. Replace with single hyphen, straight quote, three dots.")
            sys.exit(1)
        PY
    secret-patterns:
      run: |
        files=$(git diff --cached --name-only --diff-filter=ACM)
        if [ -z "$files" ]; then exit 0; fi
        hits=$(echo "$files" | xargs grep -lE "AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|sk_live_[A-Za-z0-9]{20,}|xox[abp]-[A-Za-z0-9-]{10,}|-----BEGIN [A-Z ]+PRIVATE KEY-----" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "Possible secret pattern detected in:"
          echo "$hits"
          echo ""
          echo "Review staged files. Move secrets to env or vault."
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    test-db:
      # Full CI-parity: boot postgres via docker compose, apply migrations, run all tests.
      # Slow. Skip with PACT_SKIP_PREPUSH_TESTS=1 for quick fixes; CI is still authoritative.
      run: |
        if [ "${PACT_SKIP_PREPUSH_TESTS:-0}" = "1" ]; then
          echo "[pre-push] PACT_SKIP_PREPUSH_TESTS=1 set; skipping test:db. CI must still pass."
          exit 0
        fi
        if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
          echo "[pre-push] docker unavailable; skipping test:db. Set PACT_SKIP_PREPUSH_TESTS=1 to silence."
          exit 0
        fi
        pnpm test:db
