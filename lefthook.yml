pre-commit:
  parallel: true
  commands:
    biome:
      glob: "*.{js,ts,jsx,tsx,json,jsonc}"
      run: pnpm biome check --no-errors-on-unmatched {staged_files}
    typecheck:
      glob: "*.{ts,tsx}"
      # Turbo caches per-package; only changed packages recompile.
      # Skip with PACT_SKIP_PRECOMMIT_TYPECHECK=1 for staged-only quick commits.
      run: |
        if [ "${PACT_SKIP_PRECOMMIT_TYPECHECK:-0}" = "1" ]; then
          echo "[pre-commit] PACT_SKIP_PRECOMMIT_TYPECHECK=1 set; skipping typecheck."
          exit 0
        fi
        pnpm typecheck
    ascii-tells:
      run: |
        python3 - <<'PY'
        import os, subprocess, sys
        # Include renamed files (R) so `git mv` + edit cannot smuggle non-ASCII.
        out = subprocess.check_output(
            ["git", "diff", "--cached", "--name-only", "--diff-filter=ACMR", "-z"]
        )
        files = [os.fsdecode(p) for p in out.split(b"\x00") if p]
        if not files:
            sys.exit(0)
        # Paths permitted to contain non-ASCII (Unicode data, locales, fixtures).
        allow_paths = {
            "packages/brain-core/src/cjk.ts",
        }
        # Permitted control characters: tab, LF, CR.
        allow_cc = {0x09, 0x0A, 0x0D}
        def is_binary(path):
            try:
                with open(path, "rb") as fh:
                    return b"\x00" in fh.read(8192)
            except OSError:
                return True
        found = False
        for f in files:
            if f in allow_paths:
                continue
            try:
                if is_binary(f):
                    continue
            except OSError:
                continue
            try:
                with open(f, "r", encoding="utf-8") as fh:
                    for n, line in enumerate(fh, 1):
                        for col, c in enumerate(line, 1):
                            o = ord(c)
                            if 0x20 <= o <= 0x7E or o in allow_cc:
                                continue
                            print(f"{f}:{n}:{col}: non-ASCII U+{o:04X} ({c!r})")
                            found = True
                            break
                continue
            except UnicodeDecodeError:
                pass
            except OSError:
                continue
            # Not UTF-8 but not binary (Latin-1, Windows-1254, etc.). Byte-scan
            # so Turkish comments in single-byte encodings still get caught.
            try:
                with open(f, "rb") as fh:
                    for n, line in enumerate(fh, 1):
                        for col, b in enumerate(line, 1):
                            if 0x20 <= b <= 0x7E or b in allow_cc:
                                continue
                            print(f"{f}:{n}:{col}: non-ASCII byte 0x{b:02X} (not utf-8)")
                            found = True
                            break
            except OSError:
                continue
        if found:
            print()
            print("Non-ASCII detected. Use plain ASCII: single hyphen, straight quote, three dots.")
            print("This blocks foreign-language comments, smart punctuation, NBSP, zero-width chars.")
            print("Legitimate Unicode data: add the path to allow_paths in lefthook.yml ascii-tells.")
            sys.exit(1)
        PY
    secret-patterns:
      run: |
        # ACMR includes renamed files: `git mv` + paste secret must not bypass.
        # NUL-delimited handles paths with spaces.
        hits=$(git diff --cached --name-only --diff-filter=ACMR -z | xargs -0 grep -lE "AKIA[0-9A-Z]{16}|ghp_[A-Za-z0-9]{36}|gho_[A-Za-z0-9]{36}|sk_live_[A-Za-z0-9]{20,}|xox[abp]-[A-Za-z0-9-]{10,}|-----BEGIN [A-Z ]+PRIVATE KEY-----" 2>/dev/null || true)
        if [ -n "$hits" ]; then
          echo "Possible secret pattern detected in:"
          echo "$hits"
          echo ""
          echo "Review staged files. Move secrets to env or vault."
          exit 1
        fi

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    test-db:
      # Full CI-parity: boot postgres via docker compose, apply migrations, run all tests.
      # Slow. Skip with PACT_SKIP_PREPUSH_TESTS=1 for quick fixes; CI is still authoritative.
      run: |
        if [ "${PACT_SKIP_PREPUSH_TESTS:-0}" = "1" ]; then
          echo "[pre-push] PACT_SKIP_PREPUSH_TESTS=1 set; skipping test:db. CI must still pass."
          exit 0
        fi
        if ! command -v docker >/dev/null 2>&1 || ! docker info >/dev/null 2>&1; then
          echo "[pre-push] docker unavailable; skipping test:db. Set PACT_SKIP_PREPUSH_TESTS=1 to silence."
          exit 0
        fi
        pnpm test:db
